<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>短剧 / 影视资源 · 聚合搜索（最简调试版）</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #999;
            padding: 4px 8px;
        }

        th {
            background: #f0f0f0;
        }
    </style>
</head>

<body>
    <h1>🎬 短剧 / 影视资源 · 聚合搜索</h1>

    <div>
        <label>功能类型：
            <select id="searchType">
                <option value="短剧搜索">短剧搜索</option>
                <option value="百度短剧">百度短剧</option>
                <option value="聚合资源搜索">聚合资源搜索</option>
                <option value="每日影视资源">每日影视资源</option>
                <option value="短剧热度榜">短剧热度榜</option>
                <option value="夸克热搜">夸克热搜</option>
            </select>
        </label>

        <label>关键词：
            <input type="text" id="searchText" placeholder="请输入关键词">
        </label>

        <button id="searchBtn">🔍 搜索</button>
    </div>

    <div id="status" style="margin-top:10px;"></div>

    <div id="resultArea" style="display:none;">
        <h3>结果</h3>
        <table id="resultTable">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const searchType = document.getElementById('searchType');
        const searchText = document.getElementById('searchText');
        const searchBtn = document.getElementById('searchBtn');
        const status = document.getElementById('status');
        const resultArea = document.getElementById('resultArea');
        const resultTable = document.getElementById('resultTable');

        function isRankType(type) {
            return ['每日影视资源', '短剧热度榜', '夸克热搜'].includes(type);
        }

        // 点击搜索
        searchBtn.addEventListener('click', function () {
            const type = searchType.value;
            const text = searchText.value.trim();

            if (!isRankType(type) && !text) {
                status.textContent = '请输入关键词';
                return;
            }

            const payload = { type: type, text: text };

            status.textContent = '请求中...';
            resultArea.style.display = 'none';

            fetch('/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(function (resp) {
                    console.log('HTTP status:', resp.status);
                    return resp.json();
                })
                .then(function (data) {
                    console.log('返回结果:', data);
                    status.textContent = '状态：' + (data.msg || 'OK') + '，条数：' + (data.count || 0);

                    if (data.code === 200) {
                        renderTable(data.data);
                    } else {
                        status.textContent = '失败：' + (data.msg || '未知错误');
                    }
                })
                .catch(function (err) {
                    console.error(err);
                    status.textContent = '错误：' + err;
                });
        });

        function renderTable(data) {
            if (!data || data.length === 0) {
                resultArea.style.display = 'none';
                return;
            }

            resultArea.style.display = 'block';

            var thead = resultTable.querySelector('thead');
            var tbody = resultTable.querySelector('tbody');
            thead.innerHTML = '';
            tbody.innerHTML = '';

            var keys = Object.keys(data[0]);

            // 表头
            var hr = document.createElement('tr');
            keys.forEach(function (k) {
                var th = document.createElement('th');
                th.textContent = k;
                hr.appendChild(th);
            });
            thead.appendChild(hr);

            // 表体
            data.forEach(function (item) {
                var tr = document.createElement('tr');
                keys.forEach(function (k) {
                    var td = document.createElement('td');
                    td.textContent = item[k] != null ? item[k] : '-';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
