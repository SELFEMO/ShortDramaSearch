<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短剧搜索</title>

    <!-- 网站标识图标 -->
    <link rel="icon" type="image/x-icon" href="https://api.kuleu.com/api/ico?url=https://www.kuleu.com/">

    <!-- 预连接字体服务 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;800&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --fg: #f0f0f5;
            --muted: #6b6b80;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.4);
            --card: #1a1a24;
            --border: #2a2a3a;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        /* --- 背景动效 --- */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255, 107, 53, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 92, 246, 0.1), transparent),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-secondary) 100%);
        }

        .floating-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            bottom: -50px;
            left: -50px;
            animation-delay: -10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        /* --- 布局容器 --- */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 2rem 1rem;
            max-width: 800px;
            margin: 0 auto;
        }

        /* --- 标题区域 --- */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .title-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px;
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: 0.05em;
            color: var(--fg);
        }

        .header p {
            font-size: 1rem;
            color: var(--muted);
            margin-top: 0.5rem;
        }

        /* --- 搜索框 --- */
        .search-box {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s ease;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-input {
            width: 100%;
            padding: 18px 60px 18px 20px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--fg);
            font-size: 16px;
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .search-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .search-btn:hover {
            background: #ff8555;
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        /* --- 标签 --- */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .tag {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 13px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .tag.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* --- 结果列表样式 --- */
        .result-stats {
            margin-bottom: 1rem;
            color: var(--muted);
            font-size: 14px;
        }

        .result-stats span {
            color: var(--accent);
            font-weight: 600;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .result-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            transition: all 0.2s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.5s ease forwards;
        }

        .result-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .drama-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 10px;
            display: block;
            line-height: 1.4;
        }

        .drama-title::before {
            content: '▶';
            color: var(--accent);
            margin-right: 8px;
            font-size: 14px;
            display: inline-block;
        }

        .info-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            padding-left: 22px;
            border-left: 2px solid var(--border);
            margin-left: 4px;
        }

        .info-item {
            font-size: 14px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-label {
            color: #888;
            min-width: 60px;
        }

        .info-link {
            color: var(--accent);
            text-decoration: none;
            word-break: break-all;
            transition: opacity 0.2s;
        }

        .info-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .source-icon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            object-fit: contain;
            vertical-align: middle;
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- 状态提示 --- */
        .status-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 搜索状态指示器 */
        .search-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        .search-status.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>

    <!-- 搜索状态指示器 -->
    <div id="searchStatus" class="search-status"></div>

    <main class="main-content">
        <!-- 标题区域 -->
        <header class="header">
            <div class="header-top">
                <img id="titleLogo" class="title-logo" src="https://api.kuleu.com/api/ico?url=https://www.kuleu.com/"
                    alt="Logo">
                <h1 class="font-display">短剧搜索</h1>
            </div>
            <p>发现精彩短剧，聚合全网资源</p>
        </header>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="输入短剧名称搜索..." autocomplete="off">
            <button class="search-btn" id="searchBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
            </button>
        </div>

        <!-- 热门标签 -->
        <div class="tags-container" id="hotTags">
            <span class="tag" data-keyword="霸总">霸总</span>
            <span class="tag" data-keyword="甜宠">甜宠</span>
            <span class="tag" data-keyword="穿越">穿越</span>
            <span class="tag" data-keyword="重生">重生</span>
            <span class="tag" data-keyword="古装">古装</span>
        </div>

        <!-- 结果区域 -->
        <div id="resultsArea">
            <div class="status-message" id="initialState">
                <p>输入关键词开始搜索</p>
            </div>
        </div>
    </main>

    <script>
        // === 配置部分 ===
        const SEARCH_API = 'https://api.kuleu.com/api/bddj';
        const ICO_API = 'https://api.kuleu.com/api/ico';

        // 公共 CORS 代理列表
        const CORS_PROXIES = [
            'https://cors.sh/',
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?'
        ];

        // === DOM 元素 ===
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsArea = document.getElementById('resultsArea');
        const hotTags = document.getElementById('hotTags');
        const titleLogo = document.getElementById('titleLogo');
        const searchStatus = document.getElementById('searchStatus');

        // === 状态管理 ===
        let isSearching = false;
        let searchTimer = null;

        // === 显示状态通知 ===
        function showStatus(message, duration = 2000) {
            searchStatus.textContent = message;
            searchStatus.classList.add('show');

            setTimeout(() => {
                searchStatus.classList.remove('show');
            }, duration);
        }

        // === Logo 容错处理 ===
        if (titleLogo) {
            titleLogo.onerror = function () {
                console.warn('主页 Logo 加载失败，已隐藏');
                this.style.display = 'none';
            };
        }

        // === 搜索逻辑（带防抖） ===
        function performSearch(keyword) {
            const term = keyword.trim();
            if (!term) {
                showStatus('请输入搜索关键词');
                return;
            }

            if (isSearching) {
                showStatus('正在搜索中，请稍候...');
                return;
            }

            // 清除之前的定时器
            if (searchTimer) {
                clearTimeout(searchTimer);
            }

            // 设置防抖延迟
            searchTimer = setTimeout(() => {
                executeSearch(term);
            }, 300);
        }

        // === 执行实际搜索 ===
        async function executeSearch(term) {
            isSearching = true;
            searchBtn.disabled = true;

            // 禁用所有标签
            document.querySelectorAll('.tag').forEach(tag => {
                tag.classList.add('disabled');
            });

            showLoading();
            console.log(`正在搜索: ${term}`);
            showStatus(`正在搜索: ${term}`);

            try {
                // 尝试直接请求
                let data = await tryFetchDirect(term);

                // 如果失败，依次尝试代理
                if (!data) {
                    data = await tryFetchWithProxies(term);
                }

                // 处理结果
                if (data) {
                    renderResults(data, term);
                    showStatus(`找到 ${data.data?.length || 0} 个结果`);
                } else {
                    showError('搜索失败：网络连接错误或 API 暂时不可用。');
                }
            } catch (error) {
                console.error('搜索出错:', error);
                showError('搜索过程中发生错误，请重试。');
            } finally {
                isSearching = false;
                searchBtn.disabled = false;

                // 启用所有标签
                document.querySelectorAll('.tag').forEach(tag => {
                    tag.classList.remove('disabled');
                });
            }
        }

        async function tryFetchDirect(term) {
            try {
                const res = await fetch(`${SEARCH_API}?text=${encodeURIComponent(term)}`);
                if (res.ok) return await res.json();
            } catch (e) {
                console.log('直接请求受阻，切换代理...');
            }
            return null;
        }

        async function tryFetchWithProxies(term) {
            const targetUrl = `${SEARCH_API}?text=${encodeURIComponent(term)}`;

            for (let proxy of CORS_PROXIES) {
                try {
                    const proxyUrl = proxy.includes('cors.sh')
                        ? `${proxy}${encodeURIComponent(targetUrl)}`
                        : `${proxy}${encodeURIComponent(targetUrl)}`;

                    console.log(`尝试代理: ${proxy}`);
                    const res = await fetch(proxyUrl);

                    if (res.ok) {
                        const json = await res.json();
                        if (json && (json.code || json.data)) {
                            console.log(`代理 ${proxy} 成功`);
                            return json;
                        }
                    }
                } catch (e) {
                    console.warn(`代理 ${proxy} 失败`, e);
                }
            }
            return null;
        }

        // === UI 渲染 ===
        function renderResults(data, term) {
            if (data.code === 200 && data.data && data.data.length > 0) {
                const count = data.data.length;
                let html = `<div class="result-stats">找到 <span>${count}</span> 个 "${escapeHtml(term)}" 的相关结果</div>`;
                html += '<div class="result-list">';

                data.data.forEach((item, index) => {
                    html += createResultItem(item, index);
                });

                html += '</div>';
                resultsArea.innerHTML = html;
            } else {
                resultsArea.innerHTML = `<div class="status-message">未找到相关结果</div>`;
            }
        }

        function createResultItem(item, index) {
            const name = item.name || '未知短剧';
            const link = item.viewlink || item.url || '#';
            const time = item.addtime || '未知时间';

            const domain = extractDomain(link);
            const iconUrl = domain ? `${ICO_API}?url=https://${domain}` : '';

            const delay = index * 0.05;

            return `
                <div class="result-item" style="animation-delay: ${delay}s">
                    <div class="drama-title">${escapeHtml(name)}</div>
                    
                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label">更新时间:</span>
                            <span>${escapeHtml(time)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">观看链接:</span>
                            <a href="${escapeHtml(link)}" target="_blank" class="info-link">
                                ${iconUrl ? `<img src="${iconUrl}" class="source-icon" onerror="this.style.display='none'" title="来源图标">` : ''}
                                ${escapeHtml(link)}
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        // === 辅助函数 ===
        function extractDomain(url) {
            if (!url) return '';
            try {
                return new URL(url).hostname;
            } catch (e) { return ''; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"']/g, function (s) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return map[s];
            });
        }

        function showLoading() {
            resultsArea.innerHTML = `<div class="status-message"><div class="spinner"></div><p>正在搜索...</p></div>`;
        }

        function showError(msg) {
            resultsArea.innerHTML = `<div class="status-message" style="color: var(--error);">${msg}</div>`;
        }

        // === 事件绑定 ===
        searchBtn.addEventListener('click', () => performSearch(searchInput.value));

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                performSearch(searchInput.value);
            }
        });

        hotTags.addEventListener('click', (e) => {
            if (e.target.classList.contains('tag') && !e.target.classList.contains('disabled')) {
                searchInput.value = e.target.dataset.keyword;
                performSearch(e.target.dataset.keyword);
            }
        });

        // 防止双击提交
        searchBtn.addEventListener('dblclick', (e) => {
            e.preventDefault();
            return false;
        });
    </script>
</body>

</html>
