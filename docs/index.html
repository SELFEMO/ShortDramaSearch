<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短剧搜索</title>
    <!-- 动态 Favicon，初始为空，由 JS 填充 -->
    <link rel="icon" type="image/x-icon"
        href="data:image/x-icon;base64,AAABAAEAEBAAAAEAIABoBAAAFgAAACgAAAAQAAAAIAAAAAEAIAAAAAAAAAQAABILAAASCwAAAAAAAAAAAAAAAAAAAAAAAAAA vividlywAAAGQAAACRAAAAkAAAAJEAAACQAAAAjwAAAI8AAACPAAAAjwAAAI8AAACPAAAAjwAAAI8AAACPAAAAjwAAAI8AAACPAAAAjwAAAI8AAACPAAAAjwAAAI8AAACQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;800&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --fg: #f0f0f5;
            --muted: #6b6b80;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.4);
            --card: #1a1a24;
            --border: #2a2a3a;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-display {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        /* 背景效果 */
        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255, 107, 53, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 92, 246, 0.1), transparent),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-secondary) 100%);
        }

        .floating-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            bottom: -50px;
            left: -50px;
            animation-delay: -10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 2rem 1rem;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .title-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: contain;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px;
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: 0.05em;
            color: var(--fg);
        }

        .header p {
            font-size: 1rem;
            color: var(--muted);
        }

        /* 搜索区域 */
        .search-box {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s ease;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-input {
            width: 100%;
            padding: 18px 60px 18px 20px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--fg);
            font-size: 16px;
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .search-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .search-btn:hover {
            background: #ff8555;
        }

        .search-btn svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        /* 热门标签 */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .tag {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 13px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 结果列表样式 */
        .result-stats {
            margin-bottom: 1rem;
            color: var(--muted);
            font-size: 14px;
        }

        .result-stats span {
            color: var(--accent);
            font-weight: 600;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .result-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            transition: all 0.2s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.5s ease forwards;
        }

        .result-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* 短剧名称 - 突出显示 */
        .drama-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 10px;
            display: block;
            line-height: 1.4;
        }

        .drama-title::before {
            content: '▶';
            color: var(--accent);
            margin-right: 8px;
            font-size: 14px;
            display: inline-block;
        }

        /* 信息列表 */
        .info-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            padding-left: 22px;
            border-left: 2px solid var(--border);
            margin-left: 4px;
        }

        .info-item {
            font-size: 14px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-label {
            color: #888;
            min-width: 60px;
        }

        .info-link {
            color: var(--accent);
            text-decoration: none;
            word-break: break-all;
            transition: opacity 0.2s;
        }

        .info-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .source-icon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            object-fit: contain;
            vertical-align: middle;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 状态 */
        .status-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>

    <main class="main-content">
        <!-- 标题区域 -->
        <header class="header">
            <div class="header-top">
                <img id="titleLogo" class="title-logo" src="" alt="Logo">
                <h1 class="font-display">短剧搜索</h1>
            </div>
            <p>发现精彩短剧，聚合全网资源</p>
        </header>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="输入短剧名称搜索..." autocomplete="off">
            <button class="search-btn" id="searchBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg>
            </button>
        </div>

        <!-- 热门标签 -->
        <div class="tags-container" id="hotTags">
            <span class="tag" data-keyword="霸总">霸总</span>
            <span class="tag" data-keyword="甜宠">甜宠</span>
            <span class="tag" data-keyword="穿越">穿越</span>
            <span class="tag" data-keyword="重生">重生</span>
            <span class="tag" data-keyword="古装">古装</span>
        </div>

        <!-- 结果区域 -->
        <div id="resultsArea">
            <div class="status-message" id="initialState">
                <p>输入关键词开始搜索</p>
            </div>
        </div>
    </main>

    <script>
        // === 配置部分 ===
        // 搜索 API (原接口)
        const SEARCH_API = 'https://api.kuleu.com/api/bddj';
        // 图标 API (酷乐)
        const ICO_API = 'https://api.kuleu.com/api/ico';
        // 备用图标 API (Google 服务，防备酷乐 API 无图)
        const ICO_BACKUP = 'https://www.google.com/s2/favicons?domain=';

        // 公共 CORS 代理列表 (优先级从高到低)
        const CORS_PROXIES = [
            'https://cors.sh/', // 专用 CORS 代理，通常较稳定
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?'
        ];

        // === DOM 元素 ===
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsArea = document.getElementById('resultsArea');
        const hotTags = document.getElementById('hotTags');
        const titleLogo = document.getElementById('titleLogo');

        // === 1. Logo 与 Favicon 处理 ===
        function initLogo() {
            // 获取当前页面域名，如果没有则使用默认
            const domain = window.location.hostname || 'github.com';
            const pageUrl = 'https://' + domain;

            // 构建酷乐 API URL
            const kuleUrl = `${ICO_API}?url=${encodeURIComponent(pageUrl)}`;

            // 1. 设置标题旁的 Logo
            titleLogo.src = kuleUrl;

            // 2. 设置浏览器标签页 Favicon
            changeFavicon(kuleUrl);

            // 3. 容错处理：如果酷乐 API 加载失败，尝试备用 API
            titleLogo.onerror = function () {
                console.warn('酷乐 Logo API 加载失败，尝试备用方案');
                const backupUrl = ICO_BACKUP + domain;
                this.src = backupUrl;
                changeFavicon(backupUrl);
            };
        }

        function changeFavicon(src) {
            let favicon = document.querySelector('link[rel="icon"]');
            if (!favicon) {
                favicon = document.createElement('link');
                favicon.rel = 'icon';
                document.head.appendChild(favicon);
            }
            favicon.href = src;
        }

        // === 2. 搜索逻辑 ===
        async function performSearch(keyword) {
            const term = keyword.trim();
            if (!term) return;

            showLoading();
            console.log(`正在搜索: ${term}`);

            // 尝试直接请求 (虽然大概率会跨域失败，但先试一下)
            let data = await tryFetchDirect(term);

            // 如果失败，依次尝试代理
            if (!data) {
                data = await tryFetchWithProxies(term);
            }

            // 处理结果
            if (data) {
                renderResults(data, term);
            } else {
                showError('搜索失败：网络连接错误或 API 暂时不可用。');
            }
        }

        async function tryFetchDirect(term) {
            try {
                const res = await fetch(`${SEARCH_API}?text=${encodeURIComponent(term)}`);
                if (res.ok) return await res.json();
            } catch (e) { console.log('直接请求受阻，切换代理...'); }
            return null;
        }

        async function tryFetchWithProxies(term) {
            const targetUrl = `${SEARCH_API}?text=${encodeURIComponent(term)}`;

            for (let proxy of CORS_PROXIES) {
                try {
                    // cors.sh 需要特殊拼接，其他通常是直接拼接 url
                    const proxyUrl = proxy.includes('cors.sh')
                        ? `${proxy}${encodeURIComponent(targetUrl)}`
                        : `${proxy}${encodeURIComponent(targetUrl)}`;

                    console.log(`尝试代理: ${proxy}`);
                    const res = await fetch(proxyUrl);

                    if (res.ok) {
                        const json = await res.json();
                        // 检查是否是有效 JSON
                        if (json && (json.code || json.data)) {
                            console.log(`代理 ${proxy} 成功`);
                            return json;
                        }
                    }
                } catch (e) {
                    console.warn(`代理 ${proxy} 失败`, e);
                }
            }
            return null;
        }

        // === 3. UI 渲染 ===
        function renderResults(data, term) {
            if (data.code === 200 && data.data && data.data.length > 0) {
                const count = data.data.length;
                let html = `<div class="result-stats">找到 <span>${count}</span> 个 "${escapeHtml(term)}" 的相关结果</div>`;
                html += '<div class="result-list">';

                data.data.forEach((item, index) => {
                    html += createResultItem(item, index);
                });

                html += '</div>';
                resultsArea.innerHTML = html;
            } else {
                resultsArea.innerHTML = `<div class="status-message">未找到相关结果</div>`;
            }
        }

        function createResultItem(item, index) {
            const name = item.name || '未知短剧';
            const link = item.viewlink || item.url || '#';
            const time = item.addtime || '未知时间';

            // 从链接提取域名用于显示图标
            const domain = extractDomain(link);
            const iconUrl = domain ? `${ICO_API}?url=https://${domain}` : '';

            // 每一项依次延迟显示
            const delay = index * 0.05;

            return `
                <div class="result-item" style="animation-delay: ${delay}s">
                    <!-- 名称突出显示 -->
                    <div class="drama-title">${escapeHtml(name)}</div>
                    
                    <!-- 详细信息列表 -->
                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-label">更新时间:</span>
                            <span>${escapeHtml(time)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">观看链接:</span>
                            <a href="${escapeHtml(link)}" target="_blank" class="info-link">
                                <!-- 尝试加载来源网站图标 -->
                                ${iconUrl ? `<img src="${iconUrl}" class="source-icon" onerror="this.style.display='none'" title="来源图标">` : ''}
                                ${escapeHtml(link)}
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        // === 辅助函数 ===
        function extractDomain(url) {
            if (!url) return '';
            try {
                return new URL(url).hostname;
            } catch (e) { return ''; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"']/g, function (s) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return map[s];
            });
        }

        function showLoading() {
            resultsArea.innerHTML = `<div class="status-message"><div class="spinner"></div><p>正在搜索...</p></div>`;
        }

        function showError(msg) {
            resultsArea.innerHTML = `<div class="status-message" style="color: var(--error);">${msg}</div>`;
        }

        // === 事件绑定 ===
        searchBtn.addEventListener('click', () => performSearch(searchInput.value));
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') performSearch(searchInput.value);
        });
        hotTags.addEventListener('click', (e) => {
            if (e.target.classList.contains('tag')) {
                searchInput.value = e.target.dataset.keyword;
                performSearch(e.target.dataset.keyword);
            }
        });

        // 初始化
        initLogo();
    </script>
</body>

</html>
